<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rogue Documentation Versions</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --card: #ffffff;
      --border: #d8dee9;
      --text: #1c2533;
      --muted: #5c6b80;
      --link: #005a9c;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 56rem;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    h1 {
      margin-bottom: 0.25rem;
    }
    p {
      color: var(--muted);
      margin-top: 0;
    }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem 1.5rem;
      margin-top: 1rem;
    }
    ul {
      margin: 0;
      padding-left: 1.25rem;
    }
    a {
      color: var(--link);
    }
    .home-link {
      display: inline-block;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Rogue Documentation Versions</h1>
    <p>Select released or development documentation.</p>
    <section>
      <h2>Latest Release</h2>
      <ul>
        <li><a href="/rogue/latest/">v6.10.1 - Latest Release</a></li>
      </ul>
    </section>
    <section>
      <h2>Development Docs</h2>
      <ul>
        <li><a href="/rogue/pre-release/">Pre-release</a></li>
      </ul>
    </section>
    <section>
      <h2>Release History</h2>
      <ul>
        <li><a href="/rogue/v6.10.0/">v6.10.0</a></li>
      </ul>
    </section>
    <a class="home-link" href="/rogue/latest/">Open default docs</a>
  </main>
</body>
</html>
