name: TSan CI

on:
  push:
    branches: [ hunt-for-red-october ]
  pull_request:
    branches: [ hunt-for-red-october ]
  workflow_dispatch:
    inputs:
      stress_iters:
        description: "ROGUE_STRESS_ITERS override (default 1000)"
        default: "1000"
      count:
        description: "pytest --count override (default 5)"
        default: "5"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tsan:
    name: Thread Sanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pip_requirements_ci.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev bzip2 libbz2-dev

      - name: Install Python dependencies
        run: python -m pip install -r pip_requirements_ci.txt

      - name: Python linter for scripts/repro
        run: python -m flake8 --max-line-length=120 scripts/repro/

      - name: Configure (TSan)
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake --preset tsan

      - name: Build (TSan)
        run: cmake --build --preset tsan

      - name: Install (TSan)
        run: cmake --install build-tsan

      - name: Run repro harness (TSan)
        env:
          CC: gcc-13
          CXX: g++-13
          # log_path prefix causes TSan to write race reports to tsan-report.<pid>
          # files rather than stderr, preventing them from being lost when the
          # process aborts mid-run.  halt_on_error=0 lets all tests run rather
          # than stopping on the first race (continue-on-error covers exit code).
          # conftest.py handles libtsan preload via ctypes (avoids dual-runtime
          # conflict that LD_PRELOAD causes when Python itself is uninstrumented).
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tsan.supp history_size=7 log_path=tsan-report halt_on_error=0"
          ROGUE_STRESS_ITERS: ${{ inputs.stress_iters || '1000' }}
        run: |
          source build-tsan/setup_rogue.sh
          python -m pytest scripts/repro/ -n0 \
            --count=${{ inputs.count || '5' }} \
            -m "repro" \
            2>&1 | tee tsan-log.txt || true
          # Merge per-pid TSan report files into tsan-log.txt for the artifact
          cat tsan-report.* >> tsan-log.txt 2>/dev/null || true

      - name: Upload TSan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsan-log-${{ github.run_id }}
          path: tsan-log.txt
          retention-days: 14
