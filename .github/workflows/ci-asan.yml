name: ASan CI

on:
  push:
    branches: [ hunt-for-red-october ]
  pull_request:
    branches: [ hunt-for-red-october ]
  workflow_dispatch:
    inputs:
      stress_iters:
        description: "ROGUE_STRESS_ITERS override (default 1000)"
        default: "1000"
      count:
        description: "pytest --count override (default 5)"
        default: "5"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    name: Address + UB Sanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    continue-on-error: true
    # D-06 Tier 1 iter-2: LD_PRELOAD libasan BEFORE Python starts so libasan
    # loads exactly once. Combined with dropping -fsanitize=address from link
    # flags (see Configure step below), this avoids pulling libasan as a
    # DT_NEEDED entry on rogue.so and prevents double __cxa_throw interception.
    env:
      LD_PRELOAD_LIBASAN_CMD: "gcc-13 -print-file-name=libasan.so"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pip_requirements_ci.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev bzip2 libbz2-dev

      - name: Install Python dependencies
        run: python -m pip install -r pip_requirements_ci.txt

      - name: Python linter for scripts/repro
        run: python -m flake8 --max-line-length=120 scripts/repro/

      - name: Configure (ASan+UBSan)
        env:
          CC: gcc-13
          CXX: g++-13
          # D-06 Tier 1 iter-2: drop -fsanitize=address from link flags so
          # libasan is NOT pulled as a DT_NEEDED entry on rogue.so. CFLAGS/
          # CXXFLAGS still carry -fsanitize=address for instrumentation via
          # the preset's CMAKE_CXX_FLAGS_INIT. libasan is loaded exactly once
          # via LD_PRELOAD in the Run repro harness step.
          CMAKE_SHARED_LINKER_FLAGS: "-fsanitize=undefined"
          CMAKE_EXE_LINKER_FLAGS: "-fsanitize=undefined"
        run: cmake --preset asan

      - name: Build (ASan+UBSan)
        run: cmake --build --preset asan

      - name: Install (ASan+UBSan)
        run: cmake --install build-asan

      - name: Run repro harness (ASan+UBSan)
        env:
          CC: gcc-13
          CXX: g++-13
          # D-06 Tier 1 iter-2: LD_PRELOAD libasan BEFORE Python starts so
          # libasan loads exactly once. Link flags dropped -fsanitize=address
          # in the Configure step above so libasan is NOT a DT_NEEDED of
          # rogue.so. This prevents real___cxa_throw=NULL on the second ASan
          # init that blocked Phase 3 D-24 Class A evidence capture.
          # log_path writes ASan/UBSan reports to separate files, bypassing the
          # tee pipe.  halt_on_error=0 lets pytest continue past the first error.
          # detect_leaks=0 suppresses LSan (Python interpreter leaks are noise).
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=0:log_path=/tmp/asan-report"
          UBSAN_OPTIONS: "print_stacktrace=1:log_path=/tmp/ubsan-report"
          PYTHONMALLOC: malloc
          ROGUE_STRESS_ITERS: ${{ inputs.stress_iters || '1000' }}
        run: |
          # Use the installed setup_rogue.sh (repo root); build-asan/ copy is equivalent
          # but the install step guarantees the root copy is regenerated.
          ls -la build-asan/setup_rogue.sh setup_rogue.sh || true
          source setup_rogue.sh
          # LD_PRELOAD libasan BEFORE pytest starts so libasan loads exactly once.
          export LD_PRELOAD="$(gcc-13 -print-file-name=libasan.so)"
          python -m pytest scripts/repro/ -n0 \
            --count=${{ inputs.count || '5' }} \
            -m "repro" \
            2>&1 | tee pytest-log.txt || true
          # Merge pytest output + all ASan/UBSan report files into one artifact
          cat pytest-log.txt > asan-log.txt
          if ls /tmp/asan-report.* 2>/dev/null; then
            echo "" >> asan-log.txt
            echo "=== ASan reports ===" >> asan-log.txt
            cat /tmp/asan-report.* >> asan-log.txt
          fi
          if ls /tmp/ubsan-report.* 2>/dev/null; then
            echo "" >> asan-log.txt
            echo "=== UBSan reports ===" >> asan-log.txt
            cat /tmp/ubsan-report.* >> asan-log.txt
          fi

      - name: Upload ASan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-log-${{ github.run_id }}
          path: asan-log.txt
          retention-days: 14
