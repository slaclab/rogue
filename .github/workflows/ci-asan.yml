name: ASan CI

on:
  push:
    branches: [ hunt-for-red-october ]
  pull_request:
    branches: [ hunt-for-red-october ]
  workflow_dispatch:
    inputs:
      stress_iters:
        description: "ROGUE_STRESS_ITERS override (default 1000)"
        default: "1000"
      count:
        description: "pytest --count override (default 5)"
        default: "5"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    name: Address + UB Sanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pip_requirements_ci.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev bzip2 libbz2-dev

      - name: Install Python dependencies
        run: python -m pip install -r pip_requirements_ci.txt

      - name: Python linter for scripts/repro
        run: python -m flake8 --max-line-length=120 scripts/repro/

      - name: Configure (ASan+UBSan)
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake --preset asan

      - name: Build (ASan+UBSan)
        run: cmake --build --preset asan

      - name: Run repro harness (ASan+UBSan)
        env:
          CC: gcc-13
          CXX: g++-13
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "print_stacktrace=1"
          PYTHONMALLOC: malloc
          ROGUE_STRESS_ITERS: ${{ inputs.stress_iters || '1000' }}
        run: |
          export _LIBASAN=$(gcc-13 -print-file-name=libasan.so)
          export LD_PRELOAD="${_LIBASAN}"
          source build-asan/setup_rogue.sh
          python -m pytest scripts/repro/ -n0 \
            --count=${{ inputs.count || '5' }} \
            -m "repro" \
            2>&1 | tee asan-log.txt

      - name: Upload ASan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-log-${{ github.run_id }}
          path: asan-log.txt
          retention-days: 14
