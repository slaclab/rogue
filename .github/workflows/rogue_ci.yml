# The following environment variables are required for this process:
# secrets.GH_TOKEN
# secrets.CONDA_UPLOAD_TOKEN_TAG

name: Rogue Integration
on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full_build_test:
    name: Full Build Test
    runs-on: ubuntu-24.04
    steps:

      # This step checks out a copy of your repository.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for trailing whitespace and tabs
        run: ./scripts/check_whitespace.sh

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: 'pip'
          cache-dependency-path: |
            pip_requirements_ci.txt
            pip_requirements_docs.txt

      - name: Install dependencies
        run: |
          ./scripts/ci_install_deps.sh
          python -m pip install -r pip_requirements_ci.txt

      # Run Linters
      - name: Python and C++ Linters
        run: |
          ./scripts/run_linters.sh

      # See scripts/ci_bring_up_soft_roce.sh for the azure-kernel caveat that
      # forces `continue-on-error: true` on GHA-hosted runners.
      - name: Bring up Soft-RoCE (rxe0)
        continue-on-error: true
        run: ./scripts/ci_bring_up_soft_roce.sh

      # Rogue
      - name: Build Rogue
        run: |
          python -c "import numpy; print(numpy.get_include())"
          cmake -S . -B build -DROGUE_INSTALL=local -DROGUE_BUILD_TESTS=ON -DROGUE_COVERAGE=ON
          cmake --build build -j$(nproc)
          cmake --build build --target install

      # Run Tests
      # Full Linux build runs the complete native C++ suite in a
      # Python-enabled configuration.
      - name: Rogue Native C++ Tests
        timeout-minutes: 10
        run: |
          source ./scripts/ci_test_env.sh
          ctest --test-dir build --output-on-failure -L cpp

      - name: Rogue Tests
        # 15m cap catches pytest-xdist hangs after a native-abort in a worker.
        # Observed on GHA: a SIGABRT inside a C extension leaves execnet's
        # thread_receiver waiting forever; workflow_dispatch then hits its own
        # 360-minute wall instead of failing fast.
        timeout-minutes: 15
        run: |
          source ./scripts/ci_test_env.sh
          python -m pytest -n auto --dist loadfile --cov -m "not perf"
          coverage xml -o coverage-py.xml

      # Generate C++ coverage report from .gcda files produced by ctest + pytest.
      # Scope: all Rogue C++ sources and headers under src/rogue/ and include/rogue/.
      # Exclude: tests/ (test .cpp files do not receive --coverage flags, but
      # this is belt-and-braces against build-tree artifacts leaking into the report).
      - name: Generate C++ Coverage Report
        if: always()
        run: |
          set -euo pipefail
          gcovr \
            --root . \
            --filter 'src/rogue/' \
            --filter 'include/rogue/' \
            --exclude 'tests/' \
            --print-summary \
            --txt    coverage-cpp.txt \
            --cobertura coverage-cpp.xml \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            build/
          cat coverage-cpp.txt

      # Python coverage summary to job log
      - name: Python Coverage Report
        if: always()
        run: |
          source build/setup_rogue.sh
          coverage report -m

      # Dual-language Codecov upload; non-blocking
      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./coverage-py.xml,./coverage-cpp.xml
          flags: python,cpp
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
# ----------------------------------------------------------------------------

  small_build_test:
    name: Small Build Test
    runs-on: ubuntu-24.04
    steps:

      # This step checks out a copy of your repository.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: ./scripts/ci_install_deps.sh

      # Rogue
      - name: Build Rogue
        run: |
          cmake -S . -B build -DROGUE_INSTALL=local -DROGUE_BUILD_TESTS=ON -DNO_PYTHON=1 -DSTATIC_LIB=1
          cmake --build build -j$(nproc)
          cmake --build build --target install

      # Small Linux build validates the deterministic native subset in a true
      # -DNO_PYTHON=1 configuration.
      - name: Rogue Native C++ Tests
        run: |
          source build/setup_rogue.sh
          ctest --test-dir build --output-on-failure -L no-python


# ----------------------------------------------------------------------------

  macos_arm64_build_test:
    name: macOS arm64 Build Test
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -el {0}
    steps:

      # This step checks out a copy of your repository.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          auto-activate: false
          activate-environment: rogue_build
          conda-remove-defaults: true
          use-mamba: true
          use-only-tar-bz2: true

      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: conda-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conda.yml') }}

      - name: Cache conda environment
        id: conda-env-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CONDA }}/envs/rogue_build
          key: conda-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conda.yml') }}

      - name: Create conda environment
        if: steps.conda-env-cache.outputs.cache-hit != 'true'
        run: |
          mamba env update -n rogue_build -f conda.yml

      # Rogue
      - name: Build Rogue
        run: |
          python -c "import numpy; print(numpy.get_include())"
          cmake -S . -B build -DROGUE_INSTALL=conda -DROGUE_BUILD_TESTS=ON
          cmake --build build -j$(sysctl -n hw.ncpu)
          cmake --build build --target install

      - name: Rogue Import Smoke Test
        run: |
          python -c "import rogue, pyrogue; print('rogue import ok')"

      # macOS mirrors the full-build native coverage on Apple silicon using the
      # Python-enabled build configuration.
      - name: Rogue Native C++ Tests
        shell: bash -el {0}
        run: |
          source build/setup_rogue.sh
          ctest --test-dir build --output-on-failure -L cpp

      - name: Rogue Tests
        run: |
          python -m pytest -n auto --dist loadfile -m "not perf"


# ----------------------------------------------------------------------------

  perf_test:
    name: Performance Tests
    runs-on: ubuntu-24.04
    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: 'pip'
          cache-dependency-path: 'pip_requirements.txt'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libzmq3-dev libboost-all-dev bzip2 libbz2-dev
          pip install -r pip_requirements.txt

      - name: Build Rogue
        run: |
          python -c "import numpy; print(numpy.get_include())"
          cmake -S . -B build -DROGUE_INSTALL=local
          cmake --build build -j$(nproc)
          cmake --build build --target install

      - name: Run Perf Tests
        run: |
          source build/setup_rogue.sh
          mkdir -p perf-results
          export PERF_RESULTS_DIR="${PWD}/perf-results"
          python -m pytest tests/perf -q -s

      - name: Fetch Published Perf Baselines
        if: always()
        run: |
          git fetch --depth=1 origin gh-pages || true

      - name: Perf Summary
        if: always()
        run: |
          python scripts/ci_perf_summary.py perf-results --ref-name "${GITHUB_REF_NAME}" --gh-pages-ref origin/gh-pages >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Perf Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf-results/*.json


# ----------------------------------------------------------------------------

  gen_release:
    needs: [full_build_test, small_build_test]
    uses: slaclab/ruckus/.github/workflows/gen_release.yml@main
    with:
      version: '1.0.0'
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

# ----------------------------------------------------------------------------

  conda_build_lib:
    needs: [full_build_test, small_build_test]
    uses: slaclab/ruckus/.github/workflows/conda_build_lib.yml@main
    with:
      version: '1.0.0'
    secrets:
      CONDA_UPLOAD_TOKEN_TAG: ${{ secrets.CONDA_UPLOAD_TOKEN_TAG }}

# ----------------------------------------------------------------------------

  docker_build_rogue:
    needs: [full_build_test, small_build_test]
    uses: slaclab/ruckus/.github/workflows/docker_build.yml@main
    with:
      gh_username: slacrherbst
      docker_name: rogue
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

# ----------------------------------------------------------------------------
