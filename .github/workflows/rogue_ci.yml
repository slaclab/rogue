# secrets.GH_TOKEN
# secrets.CONDA_UPLOAD_TOKEN_TAG

name: Rogue Integration
on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full_build_test:
    name: Full Build Test
    runs-on: ubuntu-24.04
    steps:

      # This step checks out a copy of your repository.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for trailing whitespace and tabs
        run: |
          # Check for trailing whitespace
          if grep -rnI '[[:blank:]]$' --include=\*.{cpp,h,py} --exclude=doctest.h .; then
            echo "Error: Trailing whitespace found in the repository!"
            exit 1
          fi

          # Check for tab characters instead of spaces
          if grep -rnI $'\t' --include=\*.{cpp,h,py} --exclude=doctest.h .; then
            echo "Error: Tab characters found in the repository! Please use spaces for indentation."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: 'pip'
          cache-dependency-path: |
            pip_requirements_ci.txt
            pip_requirements_docs.txt

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev bzip2 libbz2-dev
          python -m pip install -r pip_requirements_ci.txt

      # Run Linters
      - name: Python and C++ Linters
        run: |
          ./scripts/run_linters.sh

      # Rogue
      - name: Build Rogue
        run: |
          python -c "import numpy; print(numpy.get_include())"
          cmake -S . -B build -DROGUE_INSTALL=local -DROGUE_BUILD_TESTS=ON
          cmake --build build -j$(nproc)
          cmake --build build --target install

      # Run Tests
      # Full Linux build runs the complete native C++ suite in a
      # Python-enabled configuration.
      - name: Rogue Native C++ Tests
        run: |
          source build/setup_rogue.sh
          ctest --test-dir build --output-on-failure -L cpp

      - name: Rogue Tests
        run: |
          source build/setup_rogue.sh
          python -m pytest -n auto --dist loadfile --cov -m "not perf"

      # Code Coverage
      - name: Code Coverage
        run: |
          source build/setup_rogue.sh
          codecov
          coverage report -m

      - name: Install documentation dependencies
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
          python -m pip install -r pip_requirements_docs.txt

      # Generate Documentation
      - name: Generate Documentation
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          source build/setup_rogue.sh
          cd docs
          make html

      - name: Deploy Documentation
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: docs/build/html

# ----------------------------------------------------------------------------

  small_build_test:
    name: Small Build Test
    runs-on: ubuntu-24.04
    steps:

      # This step checks out a copy of your repository.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev bzip2 libbz2-dev

      # Rogue
      - name: Build Rogue
        run: |
          cmake -S . -B build -DROGUE_INSTALL=local -DROGUE_BUILD_TESTS=ON -DNO_PYTHON=1 -DSTATIC_LIB=1
          cmake --build build -j$(nproc)
          cmake --build build --target install

      # Small Linux build validates the deterministic native subset in a true
      # -DNO_PYTHON=1 configuration.
      - name: Rogue Native C++ Tests
        run: |
          source build/setup_rogue.sh
          ctest --test-dir build --output-on-failure -L no-python


# ----------------------------------------------------------------------------

  macos_arm64_build_test:
    name: macOS arm64 Build Test
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -el {0}
    steps:

      # This step checks out a copy of your repository.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          auto-activate: false
          activate-environment: rogue_build
          conda-remove-defaults: true
          use-mamba: true
          use-only-tar-bz2: true

      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: conda-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conda.yml') }}

      - name: Cache conda environment
        id: conda-env-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CONDA }}/envs/rogue_build
          key: conda-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conda.yml') }}

      - name: Create conda environment
        if: steps.conda-env-cache.outputs.cache-hit != 'true'
        run: |
          mamba env update -n rogue_build -f conda.yml

      # Rogue
      - name: Build Rogue
        run: |
          python -c "import numpy; print(numpy.get_include())"
          cmake -S . -B build -DROGUE_INSTALL=conda -DROGUE_BUILD_TESTS=ON
          cmake --build build -j$(sysctl -n hw.ncpu)
          cmake --build build --target install

      - name: Rogue Import Smoke Test
        run: |
          python -c "import rogue, pyrogue; print('rogue import ok')"

      # macOS mirrors the full-build native coverage on Apple silicon using the
      # Python-enabled build configuration.
      - name: Rogue Native C++ Tests
        shell: bash -el {0}
        run: |
          source build/setup_rogue.sh
          ctest --test-dir build --output-on-failure -L cpp

      - name: Rogue Tests
        run: |
          python -m pytest -n auto --dist loadfile -m "not perf"


# ----------------------------------------------------------------------------

  perf_test:
    name: Performance Tests
    runs-on: ubuntu-24.04
    steps:

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: 3.12
          cache: 'pip'
          cache-dependency-path: 'pip_requirements.txt'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libzmq3-dev libboost-all-dev bzip2 libbz2-dev
          pip install -r pip_requirements.txt

      - name: Build Rogue
        run: |
          python -c "import numpy; print(numpy.get_include())"
          cmake -S . -B build -DROGUE_INSTALL=local
          cmake --build build -j$(nproc)
          cmake --build build --target install

      - name: Run Perf Tests
        run: |
          source build/setup_rogue.sh
          mkdir -p perf-results
          export PERF_RESULTS_DIR="${PWD}/perf-results"
          python -m pytest tests/perf -q -s

      - name: Perf Summary
        if: always()
        run: |
          python scripts/ci_perf_summary.py perf-results >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Perf Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf-results/*.json


# ----------------------------------------------------------------------------

  gen_release:
    needs: [full_build_test, small_build_test]
    uses: slaclab/ruckus/.github/workflows/gen_release.yml@main
    with:
      version: '1.0.0'
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

# ----------------------------------------------------------------------------

  conda_build_lib:
    needs: [full_build_test, small_build_test]
    uses: slaclab/ruckus/.github/workflows/conda_build_lib.yml@main
    with:
      version: '1.0.0'
    secrets:
      CONDA_UPLOAD_TOKEN_TAG: ${{ secrets.CONDA_UPLOAD_TOKEN_TAG }}

# ----------------------------------------------------------------------------

  docker_build_rogue:
    needs: [full_build_test, small_build_test]
    uses: slaclab/ruckus/.github/workflows/docker_build.yml@main
    with:
      gh_username: slacrherbst
      docker_name: rogue
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

# ----------------------------------------------------------------------------
