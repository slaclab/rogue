name: Pre-release Documentation

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

on:
  push:
    branches:
      - pre-release

permissions:
  contents: write

jobs:
  publish_docs:
    name: Publish Pre-release Docs
    runs-on: ubuntu-24.04
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      ROGUE_DOCS_SITE_ROOT: /${{ github.event.repository.name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pip_requirements.txt"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen doxygen-doc libzmq3-dev libboost-all-dev bzip2 libbz2-dev
          pip install -r pip_requirements.txt

      - name: Build Rogue
        run: |
          python -c "import numpy; print(numpy.get_include())"
          mkdir build
          cd build
          cmake .. -DROGUE_INSTALL=local
          make -j"$(nproc)" install

      - name: Build documentation
        env:
          ROGUE_DOCS_SITE_ROOT: ${{ env.ROGUE_DOCS_SITE_ROOT }}
        run: |
          source build/setup_rogue.sh
          cd docs
          make html

      - name: Prepare gh-pages worktree
        run: |
          rm -rf .tmp/gh-pages
          mkdir -p .tmp
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add .tmp/gh-pages origin/gh-pages
          else
            git worktree add --detach .tmp/gh-pages
            cd .tmp/gh-pages
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi
          touch .tmp/gh-pages/.nojekyll

      - name: Update published docs tree
        run: |
          python3 scripts/docs_publish.py \
            --site-dir docs/build/html \
            --output-root .tmp/gh-pages \
            --site-root "${ROGUE_DOCS_SITE_ROOT}" \
            --mode pre-release

      - name: Commit and push
        run: |
          cd .tmp/gh-pages
          git add .
          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish pre-release docs"
          git push origin HEAD:gh-pages
