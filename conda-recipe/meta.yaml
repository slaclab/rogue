{% set name = "rogue" %}
{# Keep the leading 'v' so tidair-tag artifacts stay named rogue-vX.Y.Z-...conda. #}
{# The conda-forge feedstock should hardcode `version` without the 'v' instead. #}
{% set raw_tag = environ.get('GIT_DESCRIBE_TAG', '') or environ.get('GITHUB_REF_NAME', '') or 'v0.0.0' %}
{% set version = raw_tag if raw_tag.startswith('v') else 'v' + raw_tag %}
{% set py_version = version[1:] %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  skip: true  # [not linux]
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - sysroot_linux-64 2.28  # Target Rocky 8 glibc (2.28) for maximum compatibility
    - cmake >=3.19
    - make
  host:
    - libboost-python-devel
    - bzip2
    - zeromq
    - python
    - pip
    - setuptools
    - numpy >=2.0
  run:
    - python >=3.10,<3.14
    - numpy
    - libboost-python
    - bzip2
    - zeromq
    - ipython  # slaclab/surf dep
    - pyyaml
    - jsonpickle  # slaclab/surf dep
    - pyzmq
    - parse  # slaclab/surf dep
    - click  # slaclab/surf dep
    - sqlalchemy
    - pyserial
    - pydm >=1.18
    - qtpy >=2.0
    - pyqtgraph >=0.13
    - matplotlib
    - rdma-core  # [linux]

test:
  imports:
    - pyrogue
    - pyrogue.interfaces
    - pyrogue.protocols
    - pyrogue.examples
    - rogue
  requires:
    - pip
  commands:
    - python -c "import pyrogue; assert pyrogue.__version__ == '{{ py_version }}'"
    - pip check

about:
  home: https://github.com/slaclab/rogue
  doc_url: https://slaclab.github.io/rogue/
  dev_url: https://github.com/slaclab/rogue
  license: LicenseRef-SLAC-TID-Open-License
  license_family: BSD
  license_file: LICENSE.txt
  summary: SLAC Python Based Hardware Abstraction And Data Acquisition System
  description: |
    Rogue is a C++ and Python framework for creating hardware control and data
    acquisition systems. It provides a hierarchical device tree, register access
    abstraction, streaming data protocols, and a rich set of interfaces for
    FPGA-based systems. Originally developed at SLAC National Accelerator
    Laboratory for particle physics and photon science instrumentation.

extra:
  recipe-maintainers:
    - slacrherbst
    - ruck314
    - omar-moreno
    - bengineerd
